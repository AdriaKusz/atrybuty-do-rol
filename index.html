1311","Jako\u015b\u0107 - Manager","Pakowanie (OB)","Palety","Piktogramy dla etykiet 1,2,3",1,0,0,0,""]];

const ROLE_CLASS = ['r0','r1','r2','r3','r4','r5'];
const ROLES = [...new Set(AT.map(r => r[1]))];

// State
const results   = {};
const userNotes = {};
let filtered = [];
let page = 0;
const PAGE_SIZE = 100;

// Build filter dropdowns
(function() {
  const clsSet = [...new Set(AT.map(r => r[2]).filter(Boolean))].sort();
  const grpSet = [...new Set(AT.map(r => r[3]).filter(Boolean))].sort();
  const fCls = document.getElementById('fClass');
  const fGrp = document.getElementById('fGroup');
  clsSet.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; fCls.appendChild(o); });
  grpSet.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; fGrp.appendChild(o); });
})();

function permIcon(v) {
  return v === 1 ? '<span class="perm yes">✅</span>' : '<span class="perm no">❌</span>';
}

function resultBadge(id) {
  const r = results[id];
  if (!r) return '<span class="res-badge res-none">–</span>';
  if (r === 'pass') return '<span class="res-badge res-pass">✅ Pass</span>';
  if (r === 'fail') return '<span class="res-badge res-fail">❌ Fail</span>';
  return '<span class="res-badge res-skip">⏭ Skip</span>';
}

function activeCls(id) {
  const r = results[id];
  return { p: r==='pass'?' active-p':'', f: r==='fail'?' active-f':'', s: r==='skip'?' active-s':'' };
}

function renderPage() {
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const tbody  = document.getElementById('tbody');

  tbody.innerHTML = slice.map(t => {
    const id = t[0];
    const ri = ROLES.indexOf(t[1]);
    const rc = ROLE_CLASS[Math.max(0, ri) % ROLE_CLASS.length];
    const ac = activeCls(id);
    const roleLbl = t[1]
      .replace('Wdrożenia - ', 'W. ')
      .replace('-Stany - Manager', ' Mgr')
      .replace(' - Manager', ' Mgr');
    const noteVal = (userNotes[id] !== undefined ? userNotes[id] : (t[9] || '')).replace(/"/g, '&quot;');

    return `<tr id="row-${id}">
      <td style="font-size:10px;color:#94a3b8;white-space:nowrap">${id}</td>
      <td><span class="role-tag ${rc}">${roleLbl}</span></td>
      <td style="font-size:11px;white-space:nowrap">${t[2]}</td>
      <td style="font-size:11px;color:#555;max-width:160px">${t[3]}</td>
      <td style="max-width:220px"><b>${t[4]}</b></td>
      <td>${permIcon(t[5])}</td>
      <td>${permIcon(t[6])}</td>
      <td>${permIcon(t[7])}</td>
      <td>${permIcon(t[8])}</td>
      <td id="badge-${id}">${resultBadge(id)}</td>
      <td style="white-space:nowrap">
        <button class="rb rb-p${ac.p}" onclick="setResult('${id}','pass')">✅</button>
        <button class="rb rb-f${ac.f}" onclick="setResult('${id}','fail')">❌</button>
        <button class="rb rb-s${ac.s}" onclick="setResult('${id}','skip')">⏭</button>
      </td>
      <td><input class="note-in" value="${noteVal}" placeholder="Notatka…" oninput="saveNote(event,'${id}')" title="${t[9]||''}"></td>
    </tr>`;
  }).join('');

  renderPageNav();
}

function renderPageNav() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  let html = `<span class="page-info">Strona ${page+1} z ${total} &nbsp;·&nbsp; ${filtered.length} wyników</span>`;
  if (page > 0)        html += `<button class="page-btn" onclick="goPage(0)">«</button><button class="page-btn" onclick="goPage(${page-1})">‹</button>`;
  const s = Math.max(0, page-3), e = Math.min(total, page+4);
  for (let i = s; i < e; i++) html += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i+1}</button>`;
  if (page < total-1)  html += `<button class="page-btn" onclick="goPage(${page+1})">›</button><button class="page-btn" onclick="goPage(${total-1})">»</button>`;
  document.getElementById('pageNavTop').innerHTML = html;
  document.getElementById('pageNavBot').innerHTML = html;
}

function goPage(p) {
  page = p;
  renderPage();
  window.scrollTo(0, 0);
}

function applyFilters() {
  const role  = document.getElementById('fRole').value;
  const cls   = document.getElementById('fClass').value;
  const grp   = document.getElementById('fGroup').value;
  const perm  = document.getElementById('fPerm').value;
  const res   = document.getElementById('fResult').value;
  const srch  = document.getElementById('fSearch').value.toLowerCase().trim();

  filtered = AT.filter(t => {
    if (role && t[1] !== role) return false;
    if (cls  && t[2] !== cls)  return false;
    if (grp  && t[3] !== grp)  return false;
    if (srch && !t[4].toLowerCase().includes(srch) && !t[3].toLowerCase().includes(srch)) return false;
    if (perm === 'editable'  && t[6] !== 1) return false;
    if (perm === 'readonly'  && !(t[5]===1 && t[6]===0)) return false;
    if (perm === 'noaccess'  && t[5] !== 0) return false;
    if (perm === 'fullcrud'  && !(t[5]===1 && t[6]===1 && t[7]===1 && t[8]===1)) return false;
    if (res === 'pass'  && results[t[0]] !== 'pass') return false;
    if (res === 'fail'  && results[t[0]] !== 'fail') return false;
    if (res === 'skip'  && results[t[0]] !== 'skip') return false;
    if (res === 'none'  && results[t[0]])             return false;
    return true;
  });

  document.getElementById('sVis').textContent = filtered.length;
  page = 0;
  renderPage();
}

function setResult(id, result) {
  results[id] = result;
  // badge
  const badge = document.getElementById('badge-' + id);
  if (badge) badge.innerHTML = resultBadge(id);
  // buttons
  const row = document.getElementById('row-' + id);
  if (row) {
    const btns = row.querySelectorAll('.rb');
    btns[0].className = 'rb rb-p' + (result==='pass'?' active-p':'');
    btns[1].className = 'rb rb-f' + (result==='fail'?' active-f':'');
    btns[2].className = 'rb rb-s' + (result==='skip'?' active-s':'');
  }
  updateStats();
}

function saveNote(e, id) {
  userNotes[id] = e.target.value;
}

function updateStats() {
  const pass = Object.values(results).filter(v => v==='pass').length;
  const fail = Object.values(results).filter(v => v==='fail').length;
  const skip = Object.values(results).filter(v => v==='skip').length;
  const done = pass + fail + skip;
  document.getElementById('sP').textContent = pass;
  document.getElementById('sF').textContent = fail;
  document.getElementById('sS').textContent = skip;
  document.getElementById('hStats').textContent = `${done} / ${AT.length} wykonanych`;
  document.getElementById('hP').textContent = pass;
  document.getElementById('hF').textContent = fail;
  document.getElementById('hS').textContent = skip;
  document.getElementById('pFill').style.width = (done / AT.length * 100) + '%';
}

function markAllVisible(result) {
  filtered.forEach(t => { results[t[0]] = result; });
  renderPage();
  updateStats();
}

function resetAll() {
  if (!confirm('Zresetować wszystkie wyniki testów?')) return;
  Object.keys(results).forEach(k => delete results[k]);
  renderPage();
  updateStats();
}

function exportCSV() {
  const headers = ['ID','Rola','Klasa','Grupa','Atrybut','P','E','T','U','Wynik','Notatka'];
  const esc = s => '"' + String(s).replace(/"/g, '""') + '"';
  const pv  = v => v === 1 ? 'TAK' : 'NIE';
  const rows = AT.map(t => [
    t[0], t[1], t[2], t[3], t[4],
    pv(t[5]), pv(t[6]), pv(t[7]), pv(t[8]),
    results[t[0]] || '',
    userNotes[t[0]] !== undefined ? userNotes[t[0]] : (t[9] || '')
  ]);
  const csv = [headers, ...rows].map(r => r.map(esc).join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'PIM_Atrybuty_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// INIT
filtered = AT.slice();
applyFilters();
updateStats();
</script>
